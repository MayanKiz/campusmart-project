<!DOCTYPE html>
<html>
<head>
    <title>Campus Mart</title>
    <link rel="stylesheet" href="/style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏪 CAMPUS MART</h1>
            <p>Buy & Sell on Campus</p>
        </div>
        
        <div class="grid">
            <div class="card">
                <h2>🛍️ Buyer</h2>
                <p>Find products from students</p>
                <a href="/buyer-login" class="btn">Login</a>
                <a href="/buyer-signup" class="btn btn-black">Signup</a>
            </div>
            
            <div class="card">
                <h2>📦 Seller</h2>
                <p>Sell your old items</p>
                <a href="/seller-login" class="btn">Login</a>
                <a href="/seller-signup" class="btn btn-black">Signup</a>
            </div>
        </div>
    </div>
</body>
</html>
